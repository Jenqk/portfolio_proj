положения",content:["Настоящая политика обработки персональных данных составлена в соответствии с требованиями Федерального закона от 27.07.2006. № 152-ФЗ «О персональных данных» (далее — Закон о персональных данных) и определяет порядок обработки персональных данных и меры по обеспечению безопасности персональных данных, предпринимаемые Катковой Эльвирой Викторовной (далее — Оператор).","1.1. Оператор ставит своей важнейшей целью и условием осуществления своей деятельности соблюдение прав и свобод человека и гражданина при обработке его персональных данных, в том числе защиты прав на неприкосновенность частной жизни, личную и семейную тайну.","1.2. Настоящая политика Оператора в отношении обработки персональных данных (далее — Политика) применяется ко всей информации, которую Оператор может получить о посетителях веб-сайта https://katkova-photo.ru."]},{title:"2. Основные понятия, используемые в Политике",content:["2.1. Автоматизированная обработка персональных данных — обработка персональных данных с помощью средств вычислительной техники.","2.2. Блокирование персональных данных — временное прекращение обработки персональных данных (за исключением случаев, если обработка необходима для уточнения персональных данных).","2.3. Веб-сайт — совокупность графических и информационных материалов, а также программ для ЭВМ и баз данных, обеспечивающих их доступность в сети интернет по сетевому адресу https://katkova-photo.ru.","2.4. Информационная система персональных данных — совокупность содержащихся в базах данных персональных данных и обеспечивающих их обработку информационных технологий и технических средств.","2.5. Обезличивание персональных данных — действия, в результате которых невозможно определить без использования дополнительной информации принадлежность персональных данных конкретному Пользователю или иному субъекту персональных данных.","2.6. Обработка персональных данных — любое действие (операция) или совокупность действий (операций), совершаемых с использованием средств автоматизации или без использования таких средств с персональными данными, включая сбор, запись, систематизацию, накопление, хранение, уточнение (обновление, изменение), извлечение, использование, передачу (распространение, предоставление, доступ), обезличивание, блокирование, удаление, уничтожение персональных данных.","2.7. Оператор — государственный орган, муниципальный орган, юридическое или физическое лицо, самостоятельно или совместно с другими лицами организующие и/или осуществляющие обработку персональных данных, а также определяющие цели обработки персональных данных, состав персональных данных, подлежащих обработке, действия (операции), совершаемые с персональными данными.","2.8. Персональные данные — любая информация, относящаяся прямо или косвенно к определенному или определяемому Пользователю веб-сайта https://katkova-photo.ru.","2.9. Персональные данные, разрешенные субъектом персональных данных для распространения, — персональные данные, доступ неограниченного круга лиц к которым предоставлен субъектом персональных данных путем дачи согласия на обработку персональных данных, разрешенных субъектом персональных данных для распространения в порядке, предусмотренном Законом о персональных данных.","2.10. Пользователь — любой посетитель веб-сайта https://katkova-photo.ru.","2.11. Предоставление персональных данных — действия, направленные на раскрытие персональных данных определенному лицу или определенному кругу лиц.","2.12. Распространение персональных данных — любые действия, направленные на раскрытие персональных данных неопределенному кругу лиц (передача персональных данных) или на ознакомление с персональными данными неограниченного круга лиц.","2.13. Трансграничная передача персональных данных — передача персональных данных на территорию иностранного государства органу власти иностранного государства, иностранному физическому или иностранному юридическому лицу.","2.14. Уничтожение персональных данных — любые действия, в результате которых персональные данные уничтожаются безвозвратно с невозможностью дальнейшего восстановления содержания персональных данных в информационной системе персональных данных и/или уничтожаются материальные носители персональных данных."]},{title:"3. Основные права и обязанности Оператора",content:["3.1. Оператор имеет право:","— получать от субъекта персональных данных достоверные информацию и/или документы, содержащие персональные данные;","— в случае отзыва субъектом персональных данных согласия на обработку персональных данных Оператор вправе продолжить обработку персональных данных без согласия субъекта персональных данных при наличии оснований, указанных в Законе о персональных данных;","— самостоятельно определять состав и перечень мер, необходимых и достаточных для обеспечения выполнения обязанностей, предусмотренных Законом о персональных данных.","3.2. Оператор обязан:","— предоставлять субъекту персональных данных по его просьбе информацию, касающуюся обработки его персональных данных;","— организовывать обработку персональных данных в порядке, установленном действующим законодательством РФ;","— отвечать на обращения и запросы субъектов персональных данных и их законных представителей;","— публиковать или иным образом обеспечивать неограниченный доступ к настоящей Политике в отношении обработки персональных данных;","— принимать правовые, организационные и технические меры для защиты персональных данных от неправомерного или случайного доступа к ним."]},{title:"4. Основные права и обязанности субъектов персональных данных",content:["4.1. Субъекты персональных данных имеют право:","— получать информацию, касающуюся обработки его персональных данных;","— требовать от оператора уточнения его персональных данных, их блокирования или уничтожения в случае, если персональные данные являются неполными, устаревшими, неточными, незаконно полученными или не являются необходимыми для заявленной цели обработки;","— на отзыв согласия на обработку персональных данных;","— обжаловать в уполномоченный орган по защите прав субъектов персональных данных или в судебном порядке неправомерные действия или бездействие Оператора.","4.2. Субъекты персональных данных обязаны:","— предоставлять Оператору достоверные данные о себе;","— сообщать Оператору об уточнении (обновлении, изменении) своих персональных данных."]},{title:"5. Принципы обработки персональных данных",content:["5.1. Обработка персональных данных осуществляется на законной и справедливой основе.","5.2. Обработка персональных данных ограничивается достижением конкретных, заранее определенных и законных целей. Не допускается обработка персональных данных, несовместимая с целями сбора персональных данных.","5.3. Не допускается объединение баз данных, содержащих персональные данные, обработка которых осуществляется в целях, несовместимых между собой.","5.4. Обработке подлежат только персональные данные, которые отвечают целям их обработки.","5.5. Содержание и объем обрабатываемых персональных данных соответствуют заявленным целям обработки.","5.6. При обработке персональных данных обеспечивается точность персональных данных, их достаточность, а в необходимых случаях и актуальность по отношению к целям обработки.","5.7. Хранение персональных данных осуществляется в форме, позволяющей определить субъекта персональных данных, не дольше, чем этого требуют цели обработки персональных данных."]},{title:"6. Цели обработки персональных данных",content:[{type:"table",rows:[["Цель обработки","Организация фото- и видеосъёмки"],["Персональные данные","Фамилия, имя, отчество; электронный адрес; номера телефонов; фотографии"],["Правовые основания","Договоры, заключаемые между оператором и субъектом персональных данных"],["Виды обработки","Сбор, запись, систематизация, накопление, хранение, уничтожение и обезличивание персональных данных. Отправка информационных писем на адрес электронной почты"]]}]},{title:"7. Условия обработки персональных данных",content:["7.1. Обработка персональных данных осуществляется с согласия субъекта персональных данных на обработку его персональных данных.","7.2. Обработка персональных данных необходима для достижения целей, предусмотренных международным договором Российской Федерации или законом.","7.3. Обработка персональных данных необходима для осуществления правосудия, исполнения судебного акта.","7.4. Обработка персональных данных необходима для исполнения договора, стороной которого либо выгодоприобретателем является субъект персональных данных.","7.5. Обработка персональных данных необходима для осуществления прав и законных интересов оператора или третьих лиц.","7.6. Осуществляется обработка персональных данных, доступ неограниченного круга лиц к которым предоставлен субъектом персональных данных.","7.7. Осуществляется обработка персональных данных, подлежащих опубликованию или обязательному раскрытию в соответствии с федеральным законом."]},{title:"8. Порядок сбора, хранения, передачи и других видов обработки персональных данных",content:["Безопасность персональных данных, которые обрабатываются Оператором, обеспечивается путем реализации правовых, организационных и технических мер, необходимых для выполнения в полном объеме требований действующего законодательства в области защиты персональных данных.","8.1. Оператор обеспечивает сохранность персональных данных и принимает все возможные меры, исключающие доступ к персональным данным неуполномоченных лиц.","8.2. Персональные данные Пользователя никогда, ни при каких условиях не будут переданы третьим лицам, за исключением случаев, связанных с исполнением действующего законодательства.","8.3. В случае выявления неточностей в персональных данных, Пользователь может актуализировать их самостоятельно, путем направления Оператору уведомления на адрес электронной почты Katkova68@gmail.com с пометкой «Актуализация персональных данных».","8.4. Срок обработки персональных данных определяется достижением целей, для которых были собраны персональные данные.","Пользователь может в любой момент отозвать своё согласие на обработку персональных данных, направив Оператору уведомление посредством электронной почты на электронный адрес Katkova68@gmail.com с пометкой «Отзыв согласия на обработку персональных данных».","8.5. Вся информация, которая собирается сторонними сервисами, хранится и обрабатывается указанными лицами в соответствии с их пользовательским соглашением.","8.6. Оператор при обработке персональных данных обеспечивает конфиденциальность персональных данных."]},{title:"9. Перечень действий, производимых Оператором с полученными персональными данными",content:["9.1. Оператор осуществляет сбор, запись, систематизацию, накопление, хранение, уточнение (обновление, изменение), извлечение, использование, передачу (распространение, предоставление, доступ), обезличивание, блокирование, удаление и уничтожение персональных данных.","9.2. Оператор осуществляет автоматизированную обработку персональных данных с получением и/или передачей полученной информации по информационно-телекоммуникационным сетям или без таковой."]},{title:"10. Трансграничная передача персональных данных",content:["10.1. Оператор до начала осуществления деятельности по трансграничной передаче персональных данных обязан уведомить уполномоченный орган по защите прав субъектов персональных данных о своём намерении осуществлять трансграничную передачу персональных данных.","10.2. Оператор обязан получить соответствующие сведения от органов власти иностранного государства, иностранных физических и юридических лиц."]},{title:"11. Конфиденциальность персональных данных",content:["Оператор и иные лица, получившие доступ к персональным данным, обязаны не раскрывать третьим лицам и не распространять персональные данные без согласия субъекта персональных данных, если иное не предусмотрено федеральным законом."]},{title:"12. Заключительные положения",content:["12.1. Пользователь может получить любые разъяснения по интересующим вопросам, касающимся обработки его персональных данных, обратив
